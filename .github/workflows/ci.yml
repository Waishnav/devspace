name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 24
        include:
          - os: ubuntu-latest
            node-version: 22.19.0

    env:
      DEVSPACE_ALLOWED_ROOTS: ${{ github.workspace }}
      DEVSPACE_OAUTH_OWNER_TOKEN: ci-owner-token-that-is-long-enough
      DEVSPACE_PUBLIC_BASE_URL: http://127.0.0.1:7676

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Doctor
        run: node dist/cli.js doctor
